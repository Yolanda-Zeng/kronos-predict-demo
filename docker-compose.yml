version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model:ro
      - ./tokenizer:/app/tokenizer:ro
      - ./predictions:/app/predictions
      - ./qlib_data:/app/qlib_data:ro
    environment:
      - PYTHONPATH=/app/Kronos:/app
